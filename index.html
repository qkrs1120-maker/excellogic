<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="doc-title">업무 데이터 검토</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TITLE BAR -->
<div id="title-bar">
  <div id="tb-left">
    <svg width="16" height="16" viewBox="0 0 16 16">
      <rect x="1" y="1" width="6" height="6" fill="rgba(255,255,255,.85)"/>
      <rect x="9" y="1" width="6" height="6" fill="rgba(255,255,255,.85)"/>
      <rect x="1" y="9" width="6" height="6" fill="rgba(255,255,255,.85)"/>
      <rect x="9" y="9" width="6" height="6" fill="rgba(255,255,255,.5)"/>
    </svg>
    <span id="file-name">점검_데이터.xlsx</span>
  </div>
  <div id="tb-center"><span id="page-title">업무 데이터 검토</span></div>
  <div id="tb-right">
    <button class="wb">&#8722;</button>
    <button class="wb">&#9633;</button>
    <button class="wb wb-close">&#10005;</button>
  </div>
</div>

<!-- RIBBON TABS -->
<div id="ribbon-tab-bar">
  <button class="rtab active" data-p="p-data">데이터</button>
  <button class="rtab" data-p="p-review">검토</button>
  <button class="rtab" data-p="p-tools">도구</button>
  <button class="rtab" data-p="p-view">보기</button>
</div>

<!-- RIBBON BODY -->
<div id="ribbon-body">
  <div class="rpanel active" id="p-data">
    <div class="rgrp">
      <div class="rgbtns">
        <select id="sel-level">
          <option value="">— 분석 수준 선택 —</option>
          <option value="beginner">기본 검토 (5×5)</option>
          <option value="intermediate">심화 분석 (10×10)</option>
          <option value="expert">전문 감사 (15×15)</option>
        </select>
        <button id="btn-open-list" class="rbtn accent">항목 불러오기</button>
      </div>
      <div class="rglbl">분석 수준</div>
    </div>
    <div class="rsep"></div>
    <div class="rgrp">
      <div class="rgbtns">
        <button id="btn-verify" class="rbtn primary">✔ 검증 실행</button>
        <button id="btn-reset" class="rbtn">↺ 초기화</button>
      </div>
      <div class="rglbl">데이터 검증</div>
    </div>
    <div class="rsep"></div>
    <div class="rgrp">
      <div class="rgbtns" style="align-items:center;font-size:11px;color:#555;padding:0 8px;">
        <span id="status-txt">분석 수준을 선택하세요</span>
      </div>
      <div class="rglbl">현황</div>
    </div>
  </div>
  <div class="rpanel" id="p-review">
    <div class="rgrp"><div class="rgbtns" style="padding:8px;font-size:11px;color:#777">검토 탭</div></div>
  </div>
  <div class="rpanel" id="p-tools">
    <div class="rgrp"><div class="rgbtns" style="padding:8px;font-size:11px;color:#777">도구 탭</div></div>
  </div>
  <div class="rpanel" id="p-view">
    <div class="rgrp">
      <div class="rgbtns">
        <button class="rbtn" onclick="changeZoom(10)">확대 +</button>
        <button class="rbtn" onclick="changeZoom(-10)">축소 −</button>
        <span id="zoom-lbl" style="font-size:11px;padding:2px 6px;">100%</span>
      </div>
      <div class="rglbl">화면 배율</div>
    </div>
  </div>
</div>

<!-- FORMULA BAR -->
<div id="fbar">
  <div id="namebox-wrap"><input id="namebox" value="A1" readonly></div>
  <div id="fbar-sep"></div>
  <span id="fx-lbl"><i>f</i>x</span>
  <input id="fbar-input" readonly placeholder="셀을 선택하세요">
</div>

<!-- GRID -->
<div id="grid-wrap">
  <div id="grid-scroll">
    <table id="gtable" cellspacing="0" cellpadding="0">
      <thead id="gthead"></thead>
      <tbody id="gtbody"></tbody>
    </table>
  </div>
</div>

<!-- SHEET BAR -->
<div id="sheet-bar">
  <div id="stabs">
    <div class="stab active">분기_데이터</div>
    <div class="stab">점검_로그</div>
    <div class="stab">유지관리</div>
    <button id="stab-add">＋</button>
  </div>
  <div id="sbar-right">
    <span id="sbar-status">준비</span>
    <span id="sbar-zoom">100%</span>
    <input type="range" id="zoom-range" min="60" max="180" value="100" step="5">
  </div>
</div>

<!-- PUZZLE LIST MODAL -->
<div id="modal-list" class="modal-backdrop hidden">
  <div class="modal-box" style="width:400px;">
    <div class="modal-hdr">
      <span id="list-title">분석 항목 목록</span>
      <button class="modal-close" onclick="closeModal('modal-list')">✕</button>
    </div>
    <div class="list-subhdr">
      <span>번호</span><span>항목명</span><span>상태</span>
    </div>
    <div id="list-body" style="max-height:360px;overflow-y:auto;padding:4px;"></div>
    <div class="modal-footer">항목을 클릭하면 시트에 로드됩니다.</div>
  </div>
</div>

<!-- WIN MODAL -->
<div id="modal-win" class="modal-backdrop hidden">
  <div class="modal-box" style="width:400px;">
    <div class="modal-hdr" style="background:#1f6b3e;">
      <span>검증 완료</span>
      <button class="modal-close" onclick="closeModal('modal-win')">✕</button>
    </div>
    <div style="padding:20px 24px;">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div style="width:40px;height:40px;border-radius:50%;background:#1f6b3e;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">✔</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:#1b5e20;">데이터 정합성 검증 완료</div>
          <div id="win-msg" style="font-size:11px;color:#555;margin-top:3px;"></div>
        </div>
      </div>
      <!-- 광고 영역 -->
      <div class="ad-section">
        <div class="ad-label">※ 시스템 리소스 안내</div>
        <!-- 실제 애드센스 코드를 아래에 삽입하세요 -->
        <!-- <ins class="adsbygoogle" style="display:block;width:100%;height:90px;"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto" data-full-width-responsive="true"></ins> -->
        <div style="width:100%;height:90px;background:#f0f4ff;border:1px solid #bbdefb;border-radius:2px;display:flex;align-items:center;justify-content:center;gap:16px;">
          <div style="font-size:9px;color:#aaa;border:1px solid #ccc;border-radius:2px;padding:1px 5px;">광고</div>
          <div style="font-size:11px;color:#455a64;">관련 솔루션을 확인하세요 &nbsp;<a href="#" style="color:#1565c0;text-decoration:none;">바로가기 →</a></div>
        </div>
      </div>
      <button onclick="closeModal('modal-win')" style="margin-top:14px;width:100%;background:#1f6b3e;color:#fff;border:none;border-radius:2px;padding:7px;font-size:12px;cursor:pointer;">확인</button>
    </div>
  </div>
</div>

<!-- 우측 하단 고정 광고 -->
<div id="corner-ad">
  <div id="corner-ad-hdr">
    <span>📋 시스템 알림</span>
    <button id="corner-toggle">－</button>
  </div>
  <div id="corner-ad-body">
    <!-- 실제 애드센스 코드를 아래에 삽입하세요 -->
    <!-- <ins class="adsbygoogle"
         style="display:block;width:200px;height:110px;"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="XXXXXXXXXX"
         data-ad-format="auto"></ins> -->
    <div style="width:200px;height:110px;background:#f0f4ff;border:1px solid #bbdefb;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;">
      <div style="font-size:9px;color:#aaa;border:1px solid #ccc;border-radius:2px;padding:1px 5px;">광고</div>
      <div style="font-size:11px;color:#455a64;text-align:center;line-height:1.5;">업무 효율화 솔루션<br>지금 확인하세요</div>
      <a href="#" style="font-size:10px;color:#1565c0;text-decoration:none;">자세히 보기 →</a>
    </div>
  </div>
</div>

<script src="puzzles.js"></script>
<script src="script.js"></script>
</body>
</html>
